name: Test

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: ["main"]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        emacs-version:
          - 30.1
          - snapshot
    steps:
      # fzf-async is not on MELPA and depends on fzf-native (also not on
      # MELPA).  Check both into sibling directories so the Makefile's
      # default FZF_NATIVE_DIR=../fzf-native resolves correctly.
      - uses: actions/checkout@v4
        with:
          path: fzf-async

      - uses: actions/checkout@v4
        with:
          repository: jojojames/fzf-native
          path: fzf-native

      - uses: jcs090218/setup-emacs@master
        with:
          version: ${{ matrix.emacs-version }}

      - name: Print emacs version
        shell: bash
        run: emacs --version

      - name: Compile
        shell: bash
        working-directory: fzf-async
        run: make compile

      - name: Test
        shell: bash
        working-directory: fzf-async
        run: make test
